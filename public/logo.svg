<svg xmlns="http://www.w3.org/2000/svg" width="800" height="600" viewBox="0 0 800 600">
  <rect width="800" height="600" fill="#1a1a1a"/>
  <!-- Elegant geometric monogram / shape for Handi Crafts -->
  <g transform="translate(400, 250)">
    <path d="M-50,0 L0,-50 L50,0 L0,50 Z" fill="none" stroke="#d4af37" stroke-width="8" />
    <path d="M-80,0 L0,-80 L80,0 L0,80 Z" fill="none" stroke="#d4af37" stroke-width="4" stroke-dasharray="10 5" />
    <circle cx="0" cy="0" r="20" fill="#d4af37" />
  </g>
  <text x="400" y="420" font-family="Georgia, serif" font-size="48" font-weight="bold" fill="#ffffff" text-anchor="middle" letter-spacing="6">ABASEEN</text>
  <text x="400" y="460" font-family="Arial, sans-serif" font-size="22" fill="#d4af37" text-anchor="middle" letter-spacing="10">HANDI CRAFTS</text>
</svg>
